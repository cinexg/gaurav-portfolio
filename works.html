<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Works | Gaurav Raj Singh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-hehehe"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <a href="index.html">
                    <img src="assets/images/logo.svg" alt="Home" class="profile-pic">
                </a>
                <a href="index.html" class="mobile-nav-title">Gaurav</a>
                
                <div class="nav-tabs desktop-only">
                    <a href="works.html" class="nav-tab active">Works</a>
                    <a href="#" target="_blank" class="nav-tab">CV</a>
                    <a href="blog.html" class="nav-tab">Blog</a>
                    <a href="contact.html" class="nav-tab">Contact</a>
                </div>
            </div>
            
            <div class="nav-links desktop-only">
                <button class="nav-btn" onclick="toggleTheme()" title="Switch Theme">
                    <div class="theme-icon-container" id="theme-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    </div>
                    <span>Theme</span>
                </button>
            </div>

            <button class="mobile-menu-btn mobile-only" onclick="toggleMobileMenu()">
                <div class="dots-container">
                    <span class="dot-menu"></span><span class="dot-menu"></span><span class="dot-menu"></span>
                </div>
            </button>
        </nav>

        <div class="mobile-menu-overlay" id="mobile-menu">
            <a href="works.html" class="mobile-menu-link active">Works</a>
            <a href="#" target="_blank" class="mobile-menu-link">Resume / CV</a>
            <a href="blog.html" class="mobile-menu-link">Blog</a>
            <a href="contact.html" class="mobile-menu-link">Contact</a>
            <div style="height: 1px; background: var(--border-color); margin: 0.5rem 0;"></div>
            <span class="mobile-menu-link" onclick="toggleTheme(); toggleMobileMenu()">
                Toggle Theme
                <div class="theme-icon-container" id="mobile-theme-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </div>
            </span>
        </div>
    </div>

    <main class="view-section active">
        <header class="hero" style="margin-bottom: 4rem; flex-direction: column; align-items: flex-start; gap: 0;">
            <h1 class="hero-title animate-on-scroll" style="margin-bottom: 1rem;">Case Studies</h1>
            <p class="animate-on-scroll" style="color: var(--text-muted); font-size: 1.15rem; transition-delay: 0.1s;">Selected clients and personal projects from the past years.</p>
            <div style="margin-top: 2rem; position: relative; max-width: 400px; width: 100%;" class="animate-on-scroll">
                <input type="text" id="works-search" class="form-control" placeholder="Search case studies..." style="padding-left: 2.8rem; background: var(--surface-color);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </header>
        <div id="full-works-grid" class="works-grid animate-on-scroll" style="transition-delay: 0.2s;"></div>
        <div id="works-pagination" class="pagination-container animate-on-scroll" style="transition-delay: 0.3s;"></div>
    </main>

    <footer class="site-footer" style="margin-top: 8rem; border-top: 1px solid var(--border-color); padding-top: 3rem; padding-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
        <div style="display: flex; gap: 1.5rem;">
            <a href="cookiepolicy.html" style="color: var(--text-muted); font-size: 0.95rem; text-decoration: none;">Cookie Policy</a>
        </div>
        <p style="color: var(--text-muted); font-size: 0.95rem;">&copy; 2026 Gaurav Raj Singh. Crafted with purpose.</p>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
